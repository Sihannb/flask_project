<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AutoReco{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    body { 
      font-family: "DM Sans", sans-serif; 
    }
    h1, h2, h3 {
       font-family: "Syne", sans-serif; 
      }
    .nav-link { 
      position: relative; 
      height: 100%; 
      display: flex; 
      align-items: center; 
      transition: color 0.2s; 
    }
    .nav-link::before {
       content: ""; 
       position: absolute; 
       top: 0; 
       left: 0; 
       right: 0; 
       height: 3px; 
       background: #dc2626; 
       border-radius: 0 0 3px 3px; 
       transform: scaleX(0); 
       transform-origin: center; 
       transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); 
      }
    .nav-link:hover::before, .nav-link.active::before { transform: scaleX(1); }
    .nav-link.active { color: #dc2626; }
    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body class="bg-gradient-to-b from-red-600 to-blue-950 min-h-screen flex flex-col">

  {% include 'components/_navbar.html' %}

  <main class="flex-grow max-w-3xl mx-auto w-full px-4 py-10">
    {% block content %}{% endblock %}
  </main>

  {% include 'components/_footer.html' %}

  {% block scripts %}{% endblock %}
</body>
</html>
